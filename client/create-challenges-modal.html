<!-- Pop up création de challenge -->

<div class="modal hidden" id="createChallengeModal">
  <div class="modal-content">

    <!-- Bouton fermeture -->
    <span class="close-modal" id="closeCreateChallenge">&times;</span>

    <!-- Titre -->
    <h2>Création d’un challenge</h2>

    <!-- Formulaire -->
    <form id="createChallengeForm">

      <input
        type="text"
        placeholder="Nom de l’avatar"
        required
      />

      <input
        type="text"
        placeholder="Nom du challenge"
        required
      />

      <input
        type="text"
        placeholder="Jeu"
        required
      />

      <textarea
        placeholder="Règles"
        rows="4"
        columns="12"
        required
      ></textarea>

      <textarea
        placeholder="Description"
        rows="4"
        required
      ></textarea>

      
  

      <button type="submit">Envoyer</button>

    </form>
  </div>
</div>
