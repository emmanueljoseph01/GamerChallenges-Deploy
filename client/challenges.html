<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/variable.css" />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/challenges.css" />
    <link rel="stylesheet" href="./css/accueil.css" />
    <script src="./js/main.js" defer></script>
    <title>GamerChallenges - Challenges</title>
  </head>

  <body>
    <header class="header-bar">
      <div class="site-header">
        <img src="" alt="logo GamerChallenge" class="logo" />
        <h1 class="site-title">GamerChallenge</h1>
      </div>
      <nav class="menu">
        <ul>
          <li><a href="./index.html">Accueil</a></li>
          <li>
            <a href="./challenges.html">Liste des challenges</a>
          </li>
          <li><a href="./leaderboard.html">Classement</a></li>
          <li><a href="#" id="loginBtn">Connexion / Inscription</a></li>
        </ul>
      </nav>
    </header>

    <main class="page-container">
      <!-- Barre de recherche -->
      <section class="search-section">
        <input type="text" placeholder="Recherche par nom / catégorie" />
        <button>Rechercher</button>
      </section>

      <!-- Contenu principal -->
      <section class="content-section">
        <!-- Colonne gauche -->
        <aside class="left-column">
          <button class="create-btn">Créer</button>
        </aside>

        <!-- Colonne centrale -->
        <section class="challenge-list">
          <h2>Nom / catégorie du challenge</h2>

          <div class="challenge-card">
            <h3>Nom Challenges</h3>
            <p>mimi</p>
          </div>

          <div class="challenge-card"></div>
          <div class="challenge-card"></div>
        </section>
      </section>
    </main>

    <footer>
      <p><a href="./legal/legal-notice.html">Mentions légales</a></p>
      <p>
        <a href="./legal/privacy-policy.html">Politique de confidentialité</a>
      </p>
      <p>
        <a href="./legal/terms-of-service.html"
          >Conditions générales de ventes (CGU)</a
        >
      </p>
    </footer>

    <!-- Pop up connexion/inscription -->
    <div class="modal" id="authModal">
      <div class="modal-content">
        <span class="close-modal" id="closeModal">&times;</span>
        <h2 id="modalTitle">Connexion</h2>
        <form id="loginForm">
          <input type="email" placeholder="Email" required />
          <input type="password" placeholder="Mot de passe" required />
          <button type="submit">Se connecter</button>
        </form>
        <form id="registerForm" class="hidden">
          <input type="text" placeholder="Pseudo" required />
          <input type="email" placeholder="Email" required />
          <input type="password" placeholder="Mot de passe" required />
          <button type="submit">S’inscrire</button>
        </form>
        <p class="switch-text">
          <span id="switchToRegister">Créer un compte</span>
          <span id="switchToLogin" class="hidden">Déjà un compte ?</span>
        </p>
      </div>
    </div>

    <script src="./js/challenges.js" defer></script>
  </body>
</html>
