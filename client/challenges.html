<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/variable.css" />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/challenges.css" />
    <script src="./js/main.js" defer></script>
    <title>GamerChallenges - Challenges</title>
  </head>

  <body>
    <header class="header-bar"></header>

    <main class="page-container">
      <!-- Barre de recherche -->
      <section class="search-section">
        <input
          type="text"
          id="searchInput"
          placeholder="Recherche par nom / catégorie"
        />
        <button id="searchBtn">Rechercher</button>
      </section>

      <section class="content-section">
        <aside class="left-column">
          <button class="create-btn" id="openCreateModalBtn">
            Créer un défi
          </button>
        </aside>

        <section class="challenge-list" id="challengesContainer">
          <p>Chargement des challenges...</p>
        </section>
      </section>
    </main>

    <footer></footer>

    <!-- POP-UP de Creation -->
    <div class="modal" id="createChallengeModal">
      <div class="modal-content">
        <span class="close-modal" id="closeCreateModal">&times;</span>
        <h2 class="modal-title">Nouveau Défi</h2>

        <form id="createChallengeForm" class="challenge-form">
          <div class="form-group">
            <label for="newTitle">Titre du défi</label>
            <input type="text" name="title" id="newTitle" required />
          </div>

          <div class="form-group">
            <label for="newGame">Jeu</label>
            <select name="game_id" id="newGame" required>
              <option value="">Chargement des jeux...</option>
            </select>
          </div>

          <div class="form-group">
            <label for="newDesc">Description</label>
            <textarea
              name="description"
              id="newDesc"
              rows="4"
              required
            ></textarea>
          </div>

          <div class="form-group">
            <label for="newRules">Règles spécifiques</label>
            <textarea name="rules" id="newRules" rows="4" required></textarea>
          </div>

          <p id="createError" class="error-message"></p>
          <button type="submit" class="button-submit">
            Valider la création
          </button>
        </form>
      </div>
    </div>

    <script src="./js/challenges.js" defer></script>
  </body>
</html>
