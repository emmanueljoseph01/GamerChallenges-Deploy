<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamerChallenges - Challenges</title>
    <link rel="stylesheet" href="./css/challenges.css">
    <link rel="stylesheet" href="../css/accueil.css">
</head>

<body>

<header>
    <nav class="navbar">
        <div class="logo">
            GamerChallenges
            <img src="./assets/images/logo.png" alt="Logo" class="logo-img">
        </div>

        <ul class="nav-links">
    <li><a href="index.html" id="nav-home">Accueil</a></li>
    <li><a href="challenges.html" id="nav-challenges" class="active">Liste de challenges</a></li>
    <li><a href="leaderboard.html" id="nav-leaderboard">Classement</a></li>
    <li><a href="#" id="loginBtn">Connexion / Inscription</a></li>
</ul>
    </nav>
</header>

<main class="page-container">

    <!-- Barre de recherche -->
    <section class="search-section">
        <input type="text" placeholder="Recherche par nom / catégorie">
        <button>Rechercher</button>
    </section>

    <!-- Contenu principal -->
    <section class="content-section">

        <!-- Colonne gauche -->
        <aside class="left-column">
            <button class="create-btn">Créer</button>
        </aside>

        <!-- Colonne centrale -->
        <section class="challenge-list">

            <h2>Nom / catégorie du challenge</h2>

            <div class="challenge-card">
                <h3>Nom Challenges</h3>
                <p>mimi</p>
            </div>

            <div class="challenge-card"></div>
            <div class="challenge-card"></div>

        </section>

    </section>

</main>

<footer>
    <p><a href="./legal/legal-notice.html" class="footer-link">Mentions légales</a></p>
</footer>

<!-- Pop up connexion/inscription -->
<div class="modal" id="authModal">
    <div class="modal-content">
        <span class="close-modal" id="closeModal">&times;</span>
        <h2 id="modalTitle">Connexion</h2>
        <form id="loginForm">
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Mot de passe" required>
            <button type="submit">Se connecter</button>
        </form>
        <form id="registerForm" class="hidden">
            <input type="text" placeholder="Pseudo" required>
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Mot de passe" required>
            <button type="submit">S’inscrire</button>
        </form>
        <p class="switch-text">
            <span id="switchToRegister">Créer un compte</span>
            <span id="switchToLogin" class="hidden">Déjà un compte ?</span>
        </p>
    </div>
</div>

<script src="./js/challenges.js" defer></script>
</body>
</html>
