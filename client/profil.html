<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/variable.css" />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/profil.css" />

    <script src="./js/main.js" defer></script>
    <script src="./js/profil.js" defer></script>

    <title>GamerChallenges - Profil</title>
  </head>

  <body class="body">
    <header class="header-bar"></header>

    <main>
      <h1 class="title">Profil utilisateur</h1>

      <section class="profil-container">
        <div class="profil-header">
          <div class="profil-picture">
            <img
              src="https://via.placeholder.com/150"
              alt="Photo de profil"
              class="avatar"
              id="avatarImg"
            />
          </div>

          <div class="profil-infos">
            <h2 id="displayUsername">Chargement...</h2>
            <p>Membre GamerChallenge</p>
          </div>

          <div id="logout-button">
            <button class="button" id="logoutAction">Déconnexion</button>
          </div>
        </div>

        <form id="profileForm">
          <div class="form-group">
            <label for="username">Nom d'utilisateur</label>
            <input type="text" id="username" name="username" disabled />
          </div>

          <div class="form-group">
            <label for="email">Adresse Email</label>
            <input type="email" id="email" name="email" disabled />
          </div>

          <div class="form-group">
            <label for="birthdate">Date de naissance</label>
            <input type="date" id="birthdate" name="birthdate" disabled />
          </div>

          <div class="button-container">
            <button type="button" class="button" id="btnModify">
              Modifier
            </button>
            <button type="submit" class="button hidden" id="btnSave">
              Enregistrer
            </button>
            <button type="button" class="button hidden" id="btnCancel">
              Annuler
            </button>
          </div>
        </form>
      </section>
    </main>

    <footer></footer>
    <div class="modal" id="authModal">
      <div class="modal-content">
        <span class="close-modal" id="closeModal">&times;</span>
        <h2 id="modalTitle">Connexion</h2>

        <form id="loginForm">
          <label for="loginEmail">Adresse Email</label>
          <input
            type="email"
            name="email"
            id="loginEmail"
            placeholder="Email"
            required
          />

          <label for="loginPassword">Mot de passe</label>
          <input
            type="password"
            name="password"
            id="loginPassword"
            placeholder="Mot de passe"
            required
          />

          <p id="loginError" class="error-message"></p>
          <button type="submit">Se connecter</button>
        </form>

        <form id="registerForm" class="hidden">
          <label for="regUser">Nom d'utilisateur</label>
          <input
            type="text"
            name="username"
            id="regUser"
            placeholder="Pseudo"
            required
          />

          <label for="regEmail">Adresse Email</label>
          <input
            type="email"
            name="email"
            id="regEmail"
            placeholder="Email"
            required
          />

          <label for="regPass">Mot de passe</label>
          <input
            type="password"
            name="password"
            id="regPass"
            placeholder="Mot de passe"
            required
          />

          <label for="regDate">Date de naissance</label>
          <input type="date" name="birthdate" id="regDate" required />

          <p id="registerError" class="error-message"></p>
          <button type="submit">S’inscrire</button>
        </form>

        <p class="switch-text">
          <span id="switchToRegister">Créer un compte</span>
          <span id="switchToLogin" class="hidden">Déjà un compte ?</span>
        </p>
      </div>
    </div>
  </body>
</html>
