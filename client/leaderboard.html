<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./css/variable.css">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/leaderboard.css">
    <link rel="stylesheet" href="./css/accueil.css">
    <script src="./js/main.js" defer></script>
    <title>GamerChallenges - Classement</title>
</head>

<body>

    <header class="header-bar">
            <div class="site-header">
            <img src="./assets/images/logo.png" alt="logo GamerChallenge" class="logo" />
            <h1 class="site-title">GamerChallenge</h1>
        </div>
        <nav class="menu">
            <ul>
                <li><a href="./index.html">Accueil</a></li>
                <li>
                    <a href="./challenge/challenges.html">Liste des challenges</a>
                </li>
                <li><a href="./leaderboard.html">Classement</a></li>
                <li><a href="#" id="loginBtn">Connexion / Inscription</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">

        <h1 class="main-title">
            <!-- Titre principal -->
            Classement
        </h1>

        <!-- Ligne d’en-tête du tableau -->
        <div class="table-header">
            <div class="col">Utilisateur</div>
            <div class="col">Challenge</div>
            <div class="col">Nombre de votes</div>
            <div class="col">Nombre de défis</div>
        </div>

        <!-- Ligne données utilisateur -->
        <div class="table-row" data-user-id="1">
            <!-- data-user-id servira au JavaScript -->

            <div class="col">
                <!-- Colonne utilisateur -->
                <div class="member">
                    <!-- Avatar utilisateur -->
                    Avatar
                </div>
            </div>

            <div class="col">
                <!-- Colonne challenge -->
                <div class="data-card" data-challenge-name>
                    Nom challenge
                </div>
            </div>

            <div class="col">
                <!-- Colonne votes -->
                <div class="data-card small" data-votes>
                    0
                </div>
            </div>

            <div class="col">
                <!-- Colonne nombre de défis -->
                <div class="data-card small" data-defis>
                    0
                </div>
            </div>
        </div>

    </main>

    <footer>
        <p><a href="./legal/legal-notice.html">Mentions légales</a></p>
        <p>
            <a href="./legal/privacy-policy.html">Politique de confidentialité</a>
        </p>
        <p>
            <a href="./legal/terms-of-service.html">Conditions générales de ventes (CGU)</a>
        </p>
    </footer>

           <!-- Conteneur pour le modal -->
<div id="modalContainer"></div>

</body>

</html>
