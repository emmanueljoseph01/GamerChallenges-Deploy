<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/variable.css" />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/leaderboard.css" />
    <script src="./js/main.js" defer></script>
    <script src="./js/leaderboard.js" defer></script>
    <title>GamerChallenges - Classement</title>
  </head>

  <body>
    <header class="header-bar"></header>

    <main class="container">
      <h1 class="main-title">Classement</h1>

      <div class="table-header">
        <div class="col">Rang & Utilisateur</div>
        <div class="col">Défis relevés</div>
        <div class="col">Votes reçus</div>
      </div>

      <div id="leaderboardContent">
        <p>Chargement du classement...</p>
      </div>
    </main>

    <footer></footer>

    <div class="modal" id="authModal">
      <div class="modal-content">
        <span class="close-modal" id="closeModal">&times;</span>
        <h2 id="modalTitle">Connexion</h2>

        <form id="loginForm">
          <label for="loginEmail">Adresse Email</label>
          <input
            type="email"
            name="email"
            id="loginEmail"
            placeholder="Email"
            required
          />

          <label for="loginPassword">Mot de passe</label>
          <input
            type="password"
            name="password"
            id="loginPassword"
            placeholder="Mot de passe"
            required
          />

          <p id="loginError" class="error-message"></p>
          <button type="submit">Se connecter</button>
        </form>

        <form id="registerForm" class="hidden">
          <label for="regUser">Nom d'utilisateur</label>
          <input
            type="text"
            name="username"
            id="regUser"
            placeholder="Pseudo"
            required
          />

          <label for="regEmail">Adresse Email</label>
          <input
            type="email"
            name="email"
            id="regEmail"
            placeholder="Email"
            required
          />

          <label for="regPass">Mot de passe</label>
          <input
            type="password"
            name="password"
            id="regPass"
            placeholder="Mot de passe"
            required
          />

          <label for="regDate">Date de naissance</label>
          <input type="date" name="birthdate" id="regDate" required />

          <p id="registerError" class="error-message"></p>
          <button type="submit">S’inscrire</button>
        </form>

        <p class="switch-text">
          <span id="switchToRegister">Créer un compte</span>
          <span id="switchToLogin" class="hidden">Déjà un compte ?</span>
        </p>
      </div>
    </div>
  </body>
</html>
