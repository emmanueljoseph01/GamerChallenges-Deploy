<!-- Pop up connexion/inscription -->
    <div class="modal" id="authModal">
      <!-- Contenu du popup -->
      <div class="modal-content">
        <!-- Bouton fermeture -->
        <span class="close-modal" id="closeModal">&times;</span>

        <!-- Titre -->
        <h2 id="modalTitle">Connexion</h2>

        <!-- Formulaire de connexion -->
        <form id="loginForm">
          <input type="email" placeholder="Email" required />
          <input type="password" placeholder="Mot de passe" required />
          <button type="submit">Se connecter</button>
        </form>

        <!-- Formulaire d'inscription -->
        <form id="registerForm" class="hidden">
          <input type="nom" placeholder="Nom" required />
          <input type="prénom" placeholder="Prénom" required />
          <input
            type="date"
            placeholder="Date de naissance" value="2026-01-01"
            required/>
          <input type="pseudo" placeholder="Pseudo" required />
          <input type="email" placeholder="Email" required />
          <input type="password" placeholder="Mot de passe" required />
          <button type="submit">S’inscrire</button>
        </form>

        <!-- Switch-->
        <p class="switch-text">
          <span id="switchToRegister">Créer un compte</span>
          <span id="switchToLogin" class="hidden">Déjà un compte ?</span>
        </p>
      </div>
    </div>
