<!-- Pop up participation à un challenge -->
<div class="modal hidden" id="participateChallengeModal">
  <div class="modal-content">

    <!-- Bouton fermeture -->
    <span class="close-modal" id="closeParticipateChallenge">&times;</span>

    <!-- Titre -->
    <h2>Participer au challenge</h2>

    <!-- Nom du challenge (injecté en JS) -->
    <p id="participateChallengeName" class="challenge-info"></p>

    <!-- Formulaire -->
    <form id="participateChallengeForm">

      <input
        type="text"
        placeholder="Pseudo"
        required
      />

      <input
    type="url"
    placeholder="Lien de la vidéo (URL)"
    required
  />


      <button type="submit">Envoyer</button>

    </form>
  </div>
</div>
