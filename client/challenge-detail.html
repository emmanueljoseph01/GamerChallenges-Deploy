<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/variable.css" />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/challenges.css" />
    <script src="./js/main.js" defer></script>
    <script src="./js/challenge-detail.js" defer></script>

    <title>GamerChallenges - Détails Challenge</title>
  </head>

  <body>
    <header class="header-bar"></header>

    <main class="page-container">
      <div id="loadingMessage">Chargement du défi...</div>

      <section id="challengeContent" class="hidden">
        <h1 id="detailTitle" class="page-title">...</h1>

        <div class="challenge-card">
          <p><strong>Jeu :</strong> <span id="detailGame">...</span></p>
          <p><strong>Créé par :</strong> <span id="detailCreator">...</span></p>

          <h3>Description</h3>
          <p id="detailDesc">...</p>

          <h3>Règles</h3>
          <p id="detailRules">...</p>
        </div>

        <div class="challenge-actions">
          <button id="btnParticipate" class="button-participate hidden">
            Relever le défi
          </button>
        </div>

        <div id="participations">
          <h2>Participations</h2>
          <div id="participationsList"></div>
        </div>
      </section>

      <p>
        <a href="./challenges.html" class="button">Retour à la liste</a>
      </p>
    </main>

    <footer></footer>

    <!-- POP-UP d'Authentification -->
    <div class="modal" id="authModal"></div>

    <!-- POP-UP Participation -->
    <div class="modal" id="participateModal">
      <div class="modal-content">
        <span class="close-modal" id="closeParticipateModal">&times;</span>
        <h2 class="modal-title">Ma Participation</h2>

        <form id="participateForm" class="challenge-form">
          <div class="form-group">
            <label for="partTitle">Titre de ta performance</label>
            <input
              type="text"
              name="title"
              id="partTitle"
              placeholder="Ex: Mon speedrun record"
              required
            />
          </div>

          <div class="form-group">
            <label for="partVideo">Lien de la vidéo (YouTube/Twitch)</label>
            <input
              type="url"
              name="video_url"
              id="partVideo"
              placeholder="https://..."
              required
            />
          </div>

          <div class="form-group">
            <label for="partDesc">Description (Optionnel)</label>
            <textarea name="description" id="partDesc" rows="3"></textarea>
          </div>

          <p id="participateError" class="error-message"></p>
          <button type="submit" class="button-submit">Envoyer ma vidéo</button>
        </form>
      </div>
    </div>
  </body>
</html>
